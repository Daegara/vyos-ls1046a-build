# versions.lock — pinned inputs for the consumer build pipeline.
#
# Sourced by kernel/common/scripts/*. Each variable uses `: "${VAR:=...}"` so
# an env-var override (e.g. `KERNEL_VERSION=6.18.30 bash …`) wins over the
# default. Edit + commit to change the persistent pin.
#
# Override hierarchy (highest precedence first):
#   1. KERNEL_VERSION env var
#   2. vyos-build/data/defaults.toml `kernel_version`  ← AUTO-TRACKED
#      (resolved by kernel/common/scripts/sync-kernel-version.sh)
#   3. The pin below
#
# To re-sync this file with the upstream vyos-1x pin, run:
#     bash kernel/common/scripts/sync-kernel-version.sh --update

# ── Kernel ─────────────────────────────────────────────────────────────
# Persistent fallback pin. The actual build version is auto-discovered from
# vyos-build/data/defaults.toml at build start when that checkout is present.
# As of 2026-05-09 vyos-build pins 6.18.28 (was 6.6.137 LTS pre-mainline-migration).
: "${KERNEL_VERSION:=6.18.31}"
: "${KERNEL_SERIES:=6.18}"
export KERNEL_VERSION KERNEL_SERIES

# ── Cross-compile (skipped automatically when uname -m == aarch64) ─────
: "${ARCH:=arm64}"
export ARCH