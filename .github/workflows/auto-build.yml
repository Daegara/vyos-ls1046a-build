name: VyOS LS1046A build (reusable)

# This workflow is INTENTIONALLY reusable-only — it has no `workflow_dispatch:`
# trigger and therefore does NOT appear in the Actions "Run workflow" dropdown.
#
# It always runs on the self-hosted Azure ARM64 VM (label `ARM64`), which
# is Debian 12 bookworm aarch64 — the same distribution the build expects
# (matches the OCaml/opam pins, libc 2.36, and Python 3.11 of the
# upstream vyos-builder Docker image). The build runs natively on the host;
# there is NO `container:` block. Re-introducing `workflow_dispatch:` here
# would re-enable GitHub-hosted-runner builds and burn our public Actions
# minutes — please don't.
#
# To run a build manually, dispatch `self-hosted-build.yml` (named
# "VyOS LS1046A build (self-hosted)" in the Actions UI).

on:
  workflow_call:
    inputs:
      runs_on:
        description: 'Runner label to execute the build on'
        type: string
        required: false
        default: 'ARM64'
      BUILD_BY:
        type: string
        required: false
        default: ''
      build_version:
        type: string
        required: false
        default: ''
      ASK_KERNEL_TAG:
        type: string
        required: false
        default: ''
      flavor:
        description: 'Build flavor: default | ask | vpp. Falls back to data/flavor.pin or "default" if unset.'
        type: string
        required: false
        default: ''
    secrets:
      MOK_KEY:
        required: false
      MINISIGN_PRIVATE_KEY:
        required: false

env:
  DEBIAN_MIRROR: http://deb.debian.org/debian/
  DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
  VYOS_MIRROR: https://packages.vyos.net/repositories/current/
  # vyos-1x's debian/rules and python/setup.py both look up
  # /opt/opam/${OCAML_VERSION}/share/vyconf/{vyconf.proto,vyconfd.conf}
  # to (a) ship vyconf.proto inside the libvyosconfig .deb and
  # (b) compile vyconf.proto -> vyconf.desc via protoc for the
  # vyos-1x Python dataclass generator. Without this var both
  # paths default to bogus values and the build fails with
  # "cp: cannot stat '/opt/opam//share/vyconf/vyconf.proto'" and
  # "FileNotFoundError: vyos/proto/vyconf.desc". The opam switch
  # is bootstrapped at exactly 4.14.2 in the
  # "Bootstrap OCaml/opam for libvyosconfig" step.
  OCAML_VERSION: "4.14.2"

jobs:
  build_iso:
    runs-on: ${{ inputs.runs_on || 'ARM64' }}
    permissions:
      contents: write
    env:
      # FLAVOR drives FLAVOR-aware bin/ci-*.sh scripts via bin/common.sh.
      # Empty string lets bin/common.sh fall back to data/flavor.pin or "default".
      # On `ask`, the legacy ci-consume-ask-kernel.sh + ci-setup-kernel-ask.sh
      # path is preserved; on `default`/`vpp`, ci-stage-kernel.sh wraps
      # kernel/common/scripts/stage-kernel.sh.
      FLAVOR: ${{ inputs.flavor || github.event.inputs.flavor || '' }}
    # No `container:` — build runs natively on the self-hosted ARM64 runner.
    # The runner host (Debian 12 bookworm aarch64) provides all build deps
    # (installed in the "Install Dependencies" step below). Removing the
    # vyos-builder container removes the docker dependency on the runner
    # and gives the build direct access to /mnt NVMe and full host RAM.
    #
    # `shell: sudo -E bash -e {0}` mirrors the `--user root` of the removed
    # container: live-build needs root for debootstrap, chroot, mount,
    # losetup, kpartx, etc. The runner user (`vyos`) has passwordless
    # sudo configured on the host. `-E` preserves the environment so
    # `$GITHUB_ENV`, `$GITHUB_OUTPUT`, `$GITHUB_WORKSPACE`, and step `env:`
    # vars survive into the root shell — without `-E` sudo strips them
    # and scripts that write to those files fail with
    # "bin/ci-…sh: line N: : No such file or directory".
    defaults:
      run:
        shell: 'sudo -E bash -e {0}'
    outputs:
      BUILD_BY: ${{ steps.set_env_variables.outputs.BUILD_BY }}
      build_version: ${{ steps.set_env_variables.outputs.build_version }}
      TIMESTAMP: ${{ steps.set_env_variables.outputs.TIMESTAMP }}
      PREVIOUS_SUCCESS_BUILD_TIMESTAMP: ${{ steps.set_env_variables.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}
      image_iso: ${{ steps.build_iso.outputs.image_iso }}
      image_name: ${{ steps.build_iso.outputs.image_name }}
      flavor: ${{ steps.build_iso.outputs.flavor }}

    steps:
      - name: Verify Hardware (self-hosted)
        run: |
          echo "=== Runner Hardware ==="
          echo "CPU Cores: $(nproc)"
          lscpu | grep -E "^(Model name|Architecture|CPU\(s\)|Thread|Core)" || true
          echo ""
          echo "=== Block Devices ==="
          lsblk -d -o NAME,SIZE,MODEL 2>/dev/null || true
          echo ""
          echo "=== /mnt (NVMe scratch) ==="
          df -h /mnt || true
          ls -la /mnt || true
          echo ""
          echo "=== Memory ==="
          free -h

      - name: Relocate workspace to NVMe (self-hosted)
        run: |
          set -e
          # The host has /mnt mounted on the 880 GiB NVMe scratch disk.
          # Redirect the build scratch area to NVMe to avoid the slower OS disk.
          mkdir -p /mnt/build-workspace
          # Clean any stale content from a previous run of the same job
          rm -rf /mnt/build-workspace/* /mnt/build-workspace/.[!.]* 2>/dev/null || true
          echo "NVMe scratch ready at /mnt/build-workspace"
          df -h /mnt

      - name: Reset workspace ownership (self-hosted)
        run: |
          # The build steps run via `sudo -E bash` and create root-owned
          # files in $GITHUB_WORKSPACE (live-build chroots, vyos-build/,
          # work/, packages/, etc.). On the NEXT run, actions/checkout@v6
          # runs as the unprivileged runner user (`vyos`) and tries to
          # `unlink` those root-owned files, which fails with EACCES and
          # aborts the job before the "Initialization: set env variables"
          # step ever gets to run.  Reset ownership unconditionally so
          # checkout can repopulate the workspace cleanly.
          set -e
          if [ -d "$GITHUB_WORKSPACE" ]; then
            chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE" 2>/dev/null || \
              chown -R vyos:vyos "$GITHUB_WORKSPACE" 2>/dev/null || true
          fi
          # Also drop any prior root-owned content under the runner work root
          # in case the workspace dir itself has the wrong owner.
          if [ -d "/mnt/nvme/_work" ]; then
            chown -R vyos:vyos /mnt/nvme/_work 2>/dev/null || true
          fi

      - name: Install Dependencies (host base)
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          # Clean up any VyOS apt source dropped by a prior failed run on
          # this self-hosted runner — a stale or wrongly-signed source can
          # break `apt-get update`.  The proper VyOS source (with trusted=yes)
          # gets installed later, after the vyos-build checkout.
          rm -f /etc/apt/sources.list.d/vyos-dev.list \
                /etc/apt/sources.list.d/vyos.list \
                /etc/apt/sources.list.d/vyos.sources \
                /etc/apt/preferences.d/vyos
          apt-get update -qq
          apt-get install -y \
            libsystemd-dev libglib2.0-dev libip4tc-dev libipset-dev libnfnetlink-dev \
            libnftnl-dev libnl-nf-3-dev libpopt-dev libpcap-dev libbpf-dev \
            bubblewrap git-lfs kpartx clang llvm cmake \
            protobuf-compiler python3-cracklib python3-protobuf \
            libreadline-dev liblua5.3-dev byacc flex \
            dosfstools mtools zstd u-boot-tools \
            libpcre2-dev xorriso \
            libxml2-dev libtclap-dev \
            live-build \
            python3-tomli python3-jinja2 python3-yaml python3-toml python3-git \
            python3-pystache pbuilder \
            python3-setuptools python3-pip python3-build python3-wheel \
            python3-stdeb dh-python debhelper devscripts equivs quilt \
            fakeroot rsync curl ca-certificates
          # libxml2-dev + libtclap-dev: required to build fmc from source
          # (see bin/ci-build-fmc.sh and bin/ci-build-fmlib.sh).

      - name: Install Mergiraf (AST-aware 3-way merge driver)
        # Wired as the merge driver for *.c *.h *.py *.json *.yml *.yaml
        # *.toml *.xml via the .gitattributes drops in
        # bin/ci-setup-vyos1x.sh and bin/ci-setup-vyos-build.sh —
        # `git apply --3way` invokes it on context drift.
        #
        # Without mergiraf, --3way silently falls back to producing
        # conflict markers in the patched file AND returns exit 0 with
        # a "with conflicts" warning. That broke the vpp-flavor build
        # #25703103908 on 2026-05-11 (vyos-1x-013-hide-live-boot-disk
        # applied "with conflicts" instead of cleanly).
        #
        # Mergiraf is not packaged in Debian; install the upstream
        # Codeberg prebuilt for the runner architecture. Idempotent:
        # skip if /usr/local/bin/mergiraf is already at the pinned
        # version. Self-hosted runner caches the binary across builds.
        run: |
          set -e
          MERGIRAF_VERSION="v0.17.0"
          MERGIRAF_BIN=/usr/local/bin/mergiraf
          if "$MERGIRAF_BIN" --version 2>/dev/null | grep -q "${MERGIRAF_VERSION#v}"; then
            echo "mergiraf ${MERGIRAF_VERSION} already installed"
            exit 0
          fi
          arch=$(uname -m)
          case "$arch" in
            aarch64) tarball="mergiraf_aarch64-unknown-linux-gnu.tar.gz" ;;
            x86_64)  tarball="mergiraf_x86_64-unknown-linux-gnu.tar.gz" ;;
            *) echo "WARN: no mergiraf prebuilt for $arch — git apply --3way will fall back to conflict markers"; exit 0 ;;
          esac
          url="https://codeberg.org/mergiraf/mergiraf/releases/download/${MERGIRAF_VERSION}/${tarball}"
          tmp=$(mktemp -d)
          curl -fsSL "$url" -o "$tmp/mergiraf.tar.gz"
          tar -xzf "$tmp/mergiraf.tar.gz" -C "$tmp"
          install -m 0755 "$tmp"/mergiraf*/mergiraf "$MERGIRAF_BIN" 2>/dev/null \
            || install -m 0755 "$tmp/mergiraf" "$MERGIRAF_BIN"
          rm -rf "$tmp"
          "$MERGIRAF_BIN" --version

      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: "Initialization: set env variables"
        id: set_env_variables
        env:
          INPUT_BUILD_BY: ${{ inputs.BUILD_BY || github.event.inputs.BUILD_BY }}
          INPUT_BUILD_VERSION: ${{ inputs.build_version || github.event.inputs.build_version }}
          REPO_OWNER_ID: ${{ github.repository_owner_id }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: bin/ci-set-version.sh

      - name: Checkout vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build

      - name: Install vyos-1x build dependencies (VyOS apt repo)
        # mk-build-deps for vyos-1x needs VyOS-specific packages
        # (python3-vici >=5.7.2, python3-certbot-nginx, python3-hurry.filesize,
        #  python3-nose2, ...) that don't exist in Debian bookworm main.  The
        # vyos-build repo ships its own apt key + sources.list, so we install
        # them straight from the freshly-checked-out vyos-build/docker/.
        run: |
          set -e
          # The shipped vyos-dev.key is signed with a SHA1 self-signature
          # which newer apt/sqv policies reject. The key is fine, the
          # *signature* on it is just old. We trust it (the upstream
          # vyos-builder Docker container trusts it too), so mark the apt
          # source as `trusted=yes` to bypass the signature check.
          install -m 0644 vyos-build/docker/vyos-dev.key \
            /usr/share/keyrings/vyos-dev-archive-keyring.asc
          # Override the shipped vyos-dev.list to add `trusted=yes`.
          echo 'deb [trusted=yes signed-by=/usr/share/keyrings/vyos-dev-archive-keyring.asc] https://packages.vyos.net/repositories/current current main' \
            > /etc/apt/sources.list.d/vyos-dev.list
          cat /etc/apt/sources.list.d/vyos-dev.list
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            libzmq3-dev pylint whois \
            python3-pyudev python3-systemd python3-pam python3-pyroute2 \
            python3-voluptuous python3-lxml python3-xmltodict python3-coverage \
            python3-netaddr python3-netifaces python3-paramiko python3-passlib \
            python3-psutil python3-tabulate python3-zmq python3-fastapi \
            python3-vici python3-certbot-nginx python3-hurry.filesize \
            python3-nose2 \
            python3-jmespath python3-pyhumps

      - name: Install j2lint (Jinja2 linter not packaged in Debian)
        # vyos-1x's debian/rules invokes `make j2lint` which runs the
        # `j2lint` binary on data/templates/.  The Makefile errors out
        # ("j2lint binary not found, consider installing: pip install
        # git+https://github.com/aristanetworks/j2lint.git@341b5d5db86")
        # if the binary isn't on PATH.  Inside the upstream vyos-builder
        # Docker image j2lint is preinstalled via that exact pip URL.
        # Replicate that on the bare runner (Debian bookworm marks system
        # Python externally-managed via PEP 668, so we use
        # --break-system-packages since we're in a CI runner, not a user
        # system).
        run: |
          set -e
          if ! command -v j2lint >/dev/null 2>&1; then
            pip install --break-system-packages \
              'git+https://github.com/aristanetworks/j2lint.git@341b5d5db86'
          fi
          j2lint --version

      - name: Bootstrap OCaml/opam for libvyosconfig (cached on runner)
        # vyos-1x's debian/rules calls 'opam env --root=/opt/opam' to build
        # libvyosconfig.  The vyos-builder Dockerfile (vyos-build/docker/
        # Dockerfile lines 144-165) installs opam from upstream, runs
        # 'opam init --root=/opt/opam --comp=4.14.2', then 'opam install'
        # 14 OCaml packages (re, pcre2, num, ctypes, ctypes-foreign,
        # ctypes-build, containers, fileutils, xml-light, mustache,
        # yojson, fmt, logs).  Total cold time: ~15 min.
        #
        # /opt/opam lives outside $GITHUB_WORKSPACE, so on the persistent
        # self-hosted runner it survives between builds.  Bootstrap once
        # (slow), reuse forever (~3 s).
        run: |
          set -e
          # Install opam itself if missing (fast: Debian package).
          if [ ! -x /usr/bin/opam ]; then
            apt-get install -y --no-install-recommends opam build-essential bubblewrap unzip
          fi
          # Init opam at the path vyos-1x's Makefile expects (slow first
          # time only — survives between runner builds).
          if [ ! -d /opt/opam ]; then
            opam init --root=/opt/opam --comp=4.14.2 \
                      --disable-sandboxing --no-setup --yes
          fi
          eval "$(opam env --root=/opt/opam --set-root)"
          # 'opam install -y' on already-installed packages is a fast no-op
          # (~1 s for 13 packages), so unconditionally install — cheap and
          # keeps the recipe declarative.
          opam install -y \
            re pcre2 num ctypes ctypes-foreign ctypes-build containers \
            fileutils xml-light mustache yojson fmt logs
          # Pin vyos1x-config and vyconf at the exact commits vyos-1x's
          # libvyosconfig/Makefile depends on.  The Makefile's `depends`
          # target tries to do these pins itself via `sudo sh -c`, but
          # only when /usr/lib/libvyosconfig.so.0 isn't already present;
          # vyos-1x's debian/rules then unconditionally copies
          # $OPAM/share/vyconf/vyconf.proto and the vyconf{d,_cli,_cli_compat}
          # binaries into the libvyosconfig .deb at install time
          # ("cp /opt/opam/share/vyconf/vyconf.proto ..."), so vyconf
          # MUST be opam-installed in /opt/opam regardless of whether
          # libvyosconfig is rebuilt.
          # Commit pins are taken verbatim from vyos-1x's
          # libvyosconfig/Makefile lines 45-46.
          opam pin add -y -n vyos1x-config \
            'https://github.com/vyos/vyos1x-config.git#52132ad2c0992bf6f17a06173384030d93a29053'
          opam pin add -y -n vyconf \
            'https://github.com/vyos/vyconf.git#e25b13ae3040d02326f01bf9bedd097795fb3a62'
          opam install -y vyos1x-config vyconf
          # vyos-1x's top-level Makefile gates the libvyosconfig build behind
          #   @if [ ! -f /usr/lib/libvyosconfig.so.0 ]; then make -C libvyosconfig all; ... fi
          # but vyos-1x's debian/rules:159 unconditionally does
          #   cp libvyosconfig/_build/libvyosconfig.so debian/tmp/libvyosconfig/usr/lib/libvyosconfig.so.0
          # If a previous build's `sudo make install` left
          # /usr/lib/libvyosconfig.so.0 on the persistent self-hosted runner,
          # the gate is true, the Makefile silently no-ops, _build/
          # is never created, and the cp fails with
          #   cp: cannot stat 'libvyosconfig/_build/libvyosconfig.so'.
          # On the GitHub-hosted ARM runner this never reproduces because the
          # filesystem is fresh per-job. Force a clean state on every build.
          rm -f /usr/lib/libvyosconfig.so.0 /usr/lib/libvyosconfig.so

      - name: Setup vyos-1x patches
        env:
          MOK_KEY: ${{ secrets.MOK_KEY }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: bin/ci-setup-vyos1x.sh

      - name: Consume prebuilt ASK kernel
        # FLAVOR gate (PR 5): only consume the prebuilt ASK kernel when this
        # is an ASK build. For FLAVOR=default|vpp we build the upstream-tracked
        # kernel from source via ci-setup-kernel.sh + ci-build-packages.sh.
        # An empty FLAVOR means "use whatever data/flavor.pin / kernel/flavors/ask/kernel.pin
        # say" — preserved for backward compat with existing dispatches.
        if: env.FLAVOR == 'ask' || env.FLAVOR == ''
        env:
          # Manual override wins; otherwise script reads kernel/flavors/ask/kernel.pin.
          # Setting to empty explicitly disables ASK consume (falls through to local build).
          ASK_KERNEL_TAG: ${{ inputs.ASK_KERNEL_TAG || github.event.inputs.ASK_KERNEL_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If scheduled run or input was left blank, use the pin file.
          # Pin file relocated from data/ask-kernel.pin in May 2026 (Phase 1d
          # of the repo-layout refactor).
          if [ -z "${ASK_KERNEL_TAG:-}" ] && [ -f kernel/flavors/ask/kernel.pin ]; then
              export ASK_KERNEL_TAG="$(tr -d '[:space:]' < kernel/flavors/ask/kernel.pin)"
          fi
          # Empty literal means "no ASK, build from scratch": skip the consume step.
          if [ -n "${ASK_KERNEL_TAG:-}" ]; then
              ASK_KERNEL_TAG="$ASK_KERNEL_TAG" bin/ci-consume-ask-kernel.sh
          else
              echo "### ASK_KERNEL_TAG empty — will build kernel locally via ci-setup-kernel.sh"
          fi

      - name: Setup kernel config and patches
        run: bin/ci-setup-kernel.sh

      # NOTE: The previously-archived mihakralj/ask-ls1046a-6.6 repo is no
      # longer cloned here. Its userspace contents (cmm/, dpa_app/, fci/lib/,
      # patches/{fmc,fmlib}/, config/) were folded in-tree under ASK/ in May
      # 2026, and its OOT kernel modules (cdx, fci, auto_bridge,
      # iptables-extensions) now live in-tree under kernel/flavors/ask/ and ship
      # prebuilt in the kernel-6.6.137-askN release tarball.

      - name: Setup ASK fast-path kernel (SDK DPAA + hooks)
        # FLAVOR gate (PR 5): the ASK fast-path layer (SDK DPAA replacement,
        # hooks patches, EHASH wiring, post-defconfig overrides) is meaningful
        # only for FLAVOR=ask. For default/vpp the script's internal FLAVOR
        # gate also early-exits, so this `if:` is belt-and-braces — it skips
        # the step entirely so the build log is cleaner.
        if: env.FLAVOR == 'ask' || env.FLAVOR == ''
        run: bin/ci-setup-kernel-ask.sh

      - name: Compile Mono DTB from DTS (always rebuild from source)
        run: bin/ci-compile-mono-dtb.sh

      - name: Setup vyos-build (config, chroot files, hooks)
        run: bin/ci-setup-vyos-build.sh

      - name: Build Image Packages
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          bin/ci-build-packages.sh

      - name: Pick Packages
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          bin/ci-pick-packages.sh

      - name: Install extra packages (non-Debian)
        run: bin/ci-install-extra-packages.sh

      - name: Build VyOS ISO
        id: build_iso
        env:
          BUILD_VERSION: ${{ steps.set_env_variables.outputs.build_version }}
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          bin/ci-build-iso.sh

      - name: Verify VPP ISO contents
        if: env.FLAVOR == 'vpp'
        run: bin/ci-verify-vpp-iso.sh

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build_iso.outputs.image_name }}
          path: |
            manifest.json
            ${{ steps.build_iso.outputs.image_iso }}
            ${{ steps.build_iso.outputs.image_iso }}.minisig
          retention-days: 15
          if-no-files-found: error
          compression-level: 0

  publish:
    needs:
      - build_iso
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v6
      - name: Clone vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build
          fetch-depth: 0
      - name: Clone vyos-1x source code
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-1x
          path: vyos-1x
          fetch-depth: 0

      - id: commit_ids
        name: Get commit IDs for changelog
        run: |
          set -ex
          cd vyos-build
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_BUILD=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_BUILD" ] && CHANGELOG_COMMIT_VYOS_BUILD="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_BUILD=${CHANGELOG_COMMIT_VYOS_BUILD}" >> $GITHUB_OUTPUT
          cd ../vyos-1x
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_1X=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_1X" ] && CHANGELOG_COMMIT_VYOS_1X="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_1X=${CHANGELOG_COMMIT_VYOS_1X}" >> $GITHUB_OUTPUT

      - name: "Release publishing: generate changelog for vyos-1x"
        id: generate_changelog_for_vyos-1x
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-1x"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_1X }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-1x##{{NUMBER}}"
            }

      - name: "Release publishing: generate changelog for vyos-build"
        id: generate_changelog_for_vyos-build
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-build"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_BUILD }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-build##{{NUMBER}}"
            }

      - name: "Release publishing: gather local repo changes"
        id: local_changes
        run: |
          set -e
          SINCE="${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}"
          # Get commits in THIS repo since last build, excluding CI auto-commits (version bumps)
          LOCAL_LOG=$(git log --since "$SINCE" --format="- %s" --no-merges \
            --invert-grep --grep="^[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}-[0-9]\{4\}-rolling$" \
            HEAD 2>/dev/null || true)
          if [ -z "$LOCAL_LOG" ]; then
            LOCAL_LOG="_No local changes since last build._"
          fi
          # Write to file to avoid shell quoting issues with multiline output
          echo "$LOCAL_LOG" > /tmp/local_changes.md

      - name: "Release publishing: generate release notes"
        run: |
          LOCAL_CHANGES=$(cat /tmp/local_changes.md)
          cat <<EOF > /tmp/release_notes.md
          ## LS1046A Build Changes

          ${LOCAL_CHANGES}

          ## Upstream changes since last build

          ### vyos-1x
          ${{ steps.generate_changelog_for_vyos-1x.outputs.changelog }}
          ### vyos-build
          ${{ steps.generate_changelog_for_vyos-build.outputs.changelog }}
          EOF
          cat /tmp/release_notes.md

      # ─── Per-flavor update-check feed ─────────────────────────────────
      # VyOS's `system update-check url ...` config takes one URL per system.
      # Each flavor (default | ask | vpp) gets its own feed file so that
      # installs of one flavor don't accidentally upgrade to a different one.
      #
      # Filename scheme:
      #   version-default.json   ← consumed by flavor=default installs
      #   version-ask.json       ← consumed by flavor=ask installs
      #   version-vpp.json       ← consumed by flavor=vpp installs
      #   version.json           ← legacy alias of version-default.json
      #                            (kept so existing installs that still have
      #                             the old `…/main/version.json` URL baked
      #                             in keep working — they will receive the
      #                             default-flavor stream)
      #
      # The autocommit step below picks up whichever files changed; the other
      # flavors' feeds are left untouched until their own build runs.
      - name: "Release publishing: write per-flavor version-${FLAVOR}.json"
        env:
          FLAVOR: ${{ needs.build_iso.outputs.flavor }}
          BUILD_VERSION: ${{ needs.build_iso.outputs.build_version }}
          IMAGE_ISO: ${{ needs.build_iso.outputs.image_iso }}
          TIMESTAMP: ${{ needs.build_iso.outputs.TIMESTAMP }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if [ -z "$FLAVOR" ]; then
            echo "FATAL: build_iso did not export 'flavor' output"
            exit 1
          fi
          URL="https://github.com/${REPO}/releases/download/${BUILD_VERSION}/${IMAGE_ISO}"
          # Per-flavor feed — always written.
          cat > "version-${FLAVOR}.json" <<EOF
          [
            {
              "url": "${URL}",
              "version": "${BUILD_VERSION}",
              "timestamp": "${TIMESTAMP}"
            }
          ]
          EOF
          echo "### Wrote version-${FLAVOR}.json"
          cat "version-${FLAVOR}.json"
          # Legacy alias: version.json mirrors the default-flavor feed so
          # pre-flavor-split installs (whose config.boot still references
          # …/main/version.json) keep getting updates of the default stream.
          if [ "$FLAVOR" = "default" ]; then
            cp "version-${FLAVOR}.json" version.json
            echo "### Mirrored to legacy version.json"
          fi

      - name: "Release publishing: check if the repository was modified during runtime to prevent autocommit failure"
        id: check_if_the_repository_was_modified_during_runtime
        env:
          FLAVOR: ${{ needs.build_iso.outputs.flavor }}
        run: |
          set -e
          sudo chown -R $(whoami):$(whoami) ./*
          # Stash the freshly-generated feed file(s) before pulling.
          cp "version-${FLAVOR}.json" "/tmp/version-${FLAVOR}.json.new"
          [ "$FLAVOR" = "default" ] && cp version.json /tmp/version.json.new
          # Reset to clean tree, pull, then restore.
          git checkout -- "version-${FLAVOR}.json" 2>/dev/null || true
          [ "$FLAVOR" = "default" ] && git checkout -- version.json 2>/dev/null || true
          git pull --rebase || true
          cp "/tmp/version-${FLAVOR}.json.new" "version-${FLAVOR}.json"
          [ "$FLAVOR" = "default" ] && cp /tmp/version.json.new version.json

      - name: "Release publishing: create autocommit and tag"
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: ${{ needs.build_iso.outputs.build_version }}
          commit_message: ${{ needs.build_iso.outputs.build_version }}
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_iso.outputs.image_name }}

      - name: "Release publishing: publish release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          tag_name: ${{ needs.build_iso.outputs.build_version }}
          fail_on_unmatched_files: true
          files: |
            ${{ needs.build_iso.outputs.image_iso }}
            ${{ needs.build_iso.outputs.image_iso }}.minisig

      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
