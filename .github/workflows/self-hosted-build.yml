name: VyOS LS1046A build (self-hosted)

# Start Azure ARM64 VM (idempotent) → build on self-hosted runner.
# VM deallocation is handled by an idle-deallocate systemd timer on the
# VM itself (10 min idle threshold). See the matching "Shared Cobalt 100 VM"
# section in this repo's AGENTS.md for the full idle-deallocator pattern.
# CI must NOT call `az vm deallocate`.

on:
  schedule:
    - cron: "0 1 * * 5" 
  workflow_dispatch:
    inputs:
      BUILD_BY:
        description: 'Builder identifier (auto: mihakralj@users.noreply.github.com)'
        default: ''
      build_version:
        description: 'Version number (auto: YYYY.MM.DD-HHMM-rolling)'
        default: ''

jobs:
  # ── Step 1: Power on the Azure ARM64 VM ──────────────────────────
  # Fast path: if the self-hosted runner is already 'online' via the GitHub
  # API, skip Azure Login and `az vm start` entirely (saves ~30–90s on warm
  # runs). Only call az vm start when the runner is actually offline.
  start-vm:
    runs-on: ubuntu-latest
    env:
      # Prefer a PAT with repo-admin rights if provided; fall back to the
      # default GITHUB_TOKEN (which lacks admin:actions and returns 403).
      GH_TOKEN: ${{ secrets.RUNNER_PAT || secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      RUNNER_LABEL: ARM64
    steps:
      - name: Check runner status (fast path)
        id: probe
        run: |
          set -u
          status=$(gh api "repos/${GH_REPO}/actions/runners" \
            --jq ".runners[]? | select(.labels[].name==\"${RUNNER_LABEL}\") | .status" \
            2>/dev/null | head -1 || true)
          echo "Runner '${RUNNER_LABEL}' status: '${status:-<unknown>}'"
          if [ "$status" = "online" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            if [ -z "$status" ]; then
              echo "::warning::Runner status unavailable (RUNNER_PAT missing or lacks repo-admin scope). Will start VM unconditionally."
            fi
          fi

      - name: Azure Login
        if: steps.probe.outputs.online != 'true'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start VM (async)
        if: steps.probe.outputs.online != 'true'
        run: |
          az vm start \
            --resource-group arm64-runner-group \
            --name arm64-runner \
            --no-wait

      - name: Wait for self-hosted runner to come online
        if: steps.probe.outputs.online != 'true'
        run: |
          set -u
          # Poll the GitHub REST API until a runner with label $RUNNER_LABEL
          # reports status=online. Listing runners requires repo-admin rights;
          # if the API is not accessible we log once and fall back to a fixed
          # sleep so the workflow is never worse than before.
          probe=$(gh api "repos/${GH_REPO}/actions/runners" 2>&1 || true)
          if ! echo "$probe" | grep -q '"runners"'; then
            echo "Runner REST API not accessible with current token, falling back to fixed wait"
            echo "(add a RUNNER_PAT secret with repo-admin rights to enable active polling)"
            sleep 45
            exit 0
          fi
          echo "Polling runner status via REST API..."
          deadline=$(( $(date +%s) + 300 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            status=$(gh api "repos/${GH_REPO}/actions/runners" \
              --jq ".runners[]? | select(.labels[].name==\"${RUNNER_LABEL}\") | .status" \
              | head -1 || true)
            echo "runner '${RUNNER_LABEL}' status: ${status:-<not-registered>}"
            if [ "$status" = "online" ]; then
              echo "Runner is online."
              exit 0
            fi
            sleep 5
          done
          echo "::error::Timed out waiting for runner '${RUNNER_LABEL}' to come online"
          exit 1

  # ── Step 2: Build main ISO on the self-hosted ARM64 runner ──────
  # skip_publish: true — publishing is handled by the combined publish job
  # below, which collects both the main and stock artifacts first.
  call-auto-build:
    needs: start-vm
    uses: ./.github/workflows/auto-build.yml
    permissions:
      contents: write
    with:
      runs_on: ARM64
      BUILD_BY: ${{ github.event.inputs.BUILD_BY }}
      build_version: ${{ github.event.inputs.build_version }}
      skip_publish: true
    secrets:
      MOK_KEY: ${{ secrets.MOK_KEY }}
      MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
      SSH_SIGNING_KEY: ${{ secrets.SSH_SIGNING_KEY }}
      SSH_ALLOWED_SIGNERS: ${{ secrets.SSH_ALLOWED_SIGNERS }}

  # ── Step 3: Build stock ISO (sequential — single runner) ─────────
  # Calls the stock branch's auto-build.yml with the same build_version
  # so both ISOs share the same release tag. The stock build produces
  # vyos-<ver>-LS1046A-stock-arm64.iso. skip_publish: true so only the
  # artifact is uploaded; this job handles the combined release.
  call-stock-build:
    needs: call-auto-build
    uses: mihakralj/vyos-ls1046a-build/.github/workflows/auto-build.yml@stock
    permissions:
      contents: write
    with:
      runs_on: ARM64
      build_version: ${{ needs.call-auto-build.outputs.build_version }}
      skip_publish: true
    secrets:
      MOK_KEY: ${{ secrets.MOK_KEY }}
      MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}

  # ── Step 4: Publish combined release ─────────────────────────────
  # Runs on a hosted runner (no self-hosted needed for release publishing).
  # Downloads both artifacts and creates a single release with:
  #   - vyos-<ver>-LS1046A-arm64.iso + .minisig  (main / full-featured)
  #   - vyos-<ver>-LS1046A-stock-arm64.iso + .minisig  (stock / mainline DPAA1)
  # version.json → main ISO. version-stock.json → stock ISO.
  publish:
    needs:
      - call-auto-build
      - call-stock-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.ref_name == 'main'
    env:
      BUILD_VERSION: ${{ needs.call-auto-build.outputs.build_version }}
      MAIN_ISO: ${{ needs.call-auto-build.outputs.image_iso }}
      MAIN_NAME: ${{ needs.call-auto-build.outputs.image_name }}
      STOCK_ISO: ${{ needs.call-stock-build.outputs.image_iso }}
      STOCK_NAME: ${{ needs.call-stock-build.outputs.image_name }}
      TIMESTAMP: ${{ needs.call-auto-build.outputs.TIMESTAMP }}
      PREV_TIMESTAMP: ${{ needs.call-auto-build.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}
      REPO: ${{ github.repository }}
      # Surface secrets into job-level env so they can be tested in step `if:`
      # conditions.  The `secrets` context is NOT available in `if:` expressions
      # (GitHub Actions limitation) — `env` is the required bridge.
      SSH_SIGNING_KEY: ${{ secrets.SSH_SIGNING_KEY }}
      SSH_ALLOWED_SIGNERS: ${{ secrets.SSH_ALLOWED_SIGNERS }}
    steps:
      - uses: actions/checkout@v6

      - name: Clone vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build
          fetch-depth: 0

      - name: Clone vyos-1x source code
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-1x
          path: vyos-1x
          fetch-depth: 0

      - id: commit_ids
        name: Get commit IDs for changelog
        run: |
          set -ex
          cd vyos-build
          CHANGELOG_COMMIT_VYOS_BUILD=$(git log --since "$PREV_TIMESTAMP" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_BUILD" ] && CHANGELOG_COMMIT_VYOS_BUILD="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_BUILD=${CHANGELOG_COMMIT_VYOS_BUILD}" >> $GITHUB_OUTPUT
          cd ../vyos-1x
          CHANGELOG_COMMIT_VYOS_1X=$(git log --since "$PREV_TIMESTAMP" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_1X" ] && CHANGELOG_COMMIT_VYOS_1X="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_1X=${CHANGELOG_COMMIT_VYOS_1X}" >> $GITHUB_OUTPUT

      - name: "Release: generate changelog for vyos-1x"
        id: changelog_vyos1x
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-1x"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_1X }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-1x##{{NUMBER}}"
            }

      - name: "Release: generate changelog for vyos-build"
        id: changelog_vyosbuild
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-build"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_BUILD }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-build##{{NUMBER}}"
            }

      - name: "Release: gather local repo changes"
        id: local_changes
        run: |
          set -e
          LOCAL_LOG=$(git log --since "$PREV_TIMESTAMP" --format="- %s" --no-merges \
            --invert-grep --grep="^[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}-[0-9]\{4\}-rolling$" \
            HEAD 2>/dev/null || true)
          [ -z "$LOCAL_LOG" ] && LOCAL_LOG="_No local changes since last build._"
          echo "$LOCAL_LOG" > /tmp/local_changes.md

      - name: "Release: generate release notes"
        run: |
          cat << EOF > /tmp/release_notes.md
          ## LS1046A Build Changes

          $(cat /tmp/local_changes.md)

          ## ISOs in this release

          | File | Description |
          |------|-------------|
          | \`${MAIN_ISO}\` | Full-featured build — VPP AF_XDP, FMan PCD, CEETM, ingress-policer, ask.ko (dormant) |
          | \`${STOCK_ISO}\` | Stock mainline DPAA1 — no custom patches, vanilla upstream drivers |

          ## Upstream changes since last build

          ### vyos-1x
          ${{ steps.changelog_vyos1x.outputs.changelog }}
          ### vyos-build
          ${{ steps.changelog_vyosbuild.outputs.changelog }}
          EOF
          cat /tmp/release_notes.md

      - name: "Release: write version.json feeds"
        run: |
          set -e
          MAIN_URL="https://github.com/${REPO}/releases/download/${BUILD_VERSION}/${MAIN_ISO}"
          STOCK_URL="https://github.com/${REPO}/releases/download/${BUILD_VERSION}/${STOCK_ISO}"
          cat > version.json << EOF
          [{"url": "${MAIN_URL}", "version": "${BUILD_VERSION}", "timestamp": "${TIMESTAMP}"}]
          EOF
          # Back-compat per-flavor aliases → main ISO
          cp version.json version-default.json
          cp version.json version-ask.json
          cp version.json version-vpp.json
          # Stock flavor feed
          cat > version-stock.json << EOF
          [{"url": "${STOCK_URL}", "version": "${BUILD_VERSION}", "timestamp": "${TIMESTAMP}"}]
          EOF
          echo "### version.json:"; cat version.json
          echo "### version-stock.json:"; cat version-stock.json

      - name: "Release: pull latest and restore version feeds"
        run: |
          set -e
          sudo chown -R $(whoami):$(whoami) ./*
          for f in version.json version-default.json version-ask.json version-vpp.json version-stock.json; do
            cp "$f" "/tmp/${f}.new"
            git checkout -- "$f" 2>/dev/null || true
          done
          git pull --rebase || true
          for f in version.json version-default.json version-ask.json version-vpp.json version-stock.json; do
            cp "/tmp/${f}.new" "$f"
          done

      - name: "Release: configure commit signing"
        if: ${{ env.SSH_SIGNING_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key
          echo "$SSH_ALLOWED_SIGNERS" > ~/.ssh/allowed_signers
          git config --global user.signingkey ~/.ssh/signing_key
          git config --global commit.gpgsign true
          git config --global gpg.format ssh
          git config --global gpg.ssh.allowedSignersFile ~/.ssh/allowed_signers

      - name: "Release: autocommit version feeds and tag"
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: ${{ needs.call-auto-build.outputs.build_version }}
          commit_message: ${{ needs.call-auto-build.outputs.build_version }}
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - name: "Release: download main artifact"
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.call-auto-build.outputs.image_name }}

      - name: "Release: download stock artifact"
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.call-stock-build.outputs.image_name }}

      - name: "Release: publish combined release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          tag_name: ${{ needs.call-auto-build.outputs.build_version }}
          fail_on_unmatched_files: true
          files: |
            ${{ needs.call-auto-build.outputs.image_iso }}
            ${{ needs.call-auto-build.outputs.image_iso }}.minisig
            ${{ needs.call-stock-build.outputs.image_iso }}
            ${{ needs.call-stock-build.outputs.image_iso }}.minisig

      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: VM deallocation is intentionally NOT a CI step. The VM runs a
  # systemd timer (idle-deallocate.service) that self-deallocates after 10
  # min of runner idleness. Adding a stop-vm step here would re-introduce
  # the VM race against the in-VM idle-deallocate daemon (or, historically,
  # a cross-workflow stop killing this build mid-flight) that was observed
  # in production 2026-05-06.
